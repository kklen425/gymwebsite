<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yamasaki Boxing HK | My Bookings</title>
  <style>
    :root {
      --text: #f5f1e8;
      --muted: #b5ada1;
      --accent: #dc2626;
      --accent-strong: #ef4444;
      --gold: #d1a054;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --content-width: 860px;
      --nav-height: 78px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(220, 38, 38, 0.22), transparent 26%),
        radial-gradient(circle at top left, rgba(209, 160, 84, 0.08), transparent 20%),
        linear-gradient(180deg, #121212 0%, #090909 44%, #050505 100%);
      min-height: 100vh;
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent 88%);
      opacity: 0.45;
    }

    a { color: inherit; text-decoration: none; }
    input, button { font: inherit; }

    .container {
      width: min(calc(100% - 2rem), var(--content-width));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(16px);
      background: rgba(9, 9, 9, 0.86);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-shell {
      min-height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.95), rgba(127, 29, 29, 0.9));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .brand-text small {
      display: block;
      color: var(--gold);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-text strong {
      display: block;
      font-size: 1rem;
      letter-spacing: 0.08em;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(135deg, var(--accent-strong), var(--accent));
      color: #fff;
      min-height: 46px;
      padding: 0 1.15rem;
      font-weight: 700;
      box-shadow: 0 18px 32px rgba(220, 38, 38, 0.3);
    }

    main {
      padding: 3rem 0;
    }

    .panel {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03)),
        rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.4rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 700;
    }

    h1 {
      margin: 1rem 0 0.65rem;
      font-size: clamp(2rem, 7vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    label {
      color: var(--muted);
      font-size: 0.94rem;
    }

    input {
      width: 100%;
      padding: 1rem 1.05rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    input:focus {
      outline: 1px solid rgba(220, 38, 38, 0.45);
      border-color: rgba(220, 38, 38, 0.45);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      border-radius: 999px;
      border: 0;
      background: linear-gradient(135deg, var(--accent-strong), var(--accent));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 18px 32px rgba(220, 38, 38, 0.3);
    }

    .note {
      margin-top: 1rem;
      padding: 0.95rem 1rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-shell">
      <a class="brand" href="index.html" aria-label="返回首頁">
        <span class="brand-mark">YB</span>
        <span class="brand-text">
          <small>Hong Kong Boxing Gym</small>
          <strong>Yamasaki Boxing HK</strong>
        </span>
      </a>
      <a class="nav-link" href="index.html">返回主站</a>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="panel">
        <span class="eyebrow">My Booking</span>
        <h1>查看我的預約</h1>
        <p>輸入你預約時使用的 Email，系統會帶你前往 Cal.com 的預約查詢頁面。</p>

        <form id="booking-lookup-form">
          <div>
            <label for="booking-email">輸入你的 Email 查看預約</label>
            <input id="booking-email" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <button type="submit">查看預約 View Bookings</button>
        </form>

        <div class="note">預約確認將發送至你的電郵</div>
      </section>
    </div>
  </main>

  <script>
    document.getElementById("booking-lookup-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const email = document.getElementById("booking-email").value.trim();
      if (!email) return;
      window.location.href = "https://cal.com/booking?email=" + encodeURIComponent(email);
    });
  </script>
</body>
</html>
