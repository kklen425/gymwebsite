<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Boxing HK | 管理後台</title>
  <style>
    :root{--text:#f5f1e8;--muted:#a8a29e;--accent:#dc2626;--accent-strong:#ef4444;--accent-soft:rgba(220,38,38,.16);--gold:#d1a054;--danger:#f87171;--success:#22c55e;--shadow:0 24px 60px rgba(0,0,0,.35);--radius:24px;--content-width:1240px;--nav-height:78px}
    *{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top right,rgba(220,38,38,.2),transparent 28%),radial-gradient(circle at top left,rgba(209,160,84,.09),transparent 22%),linear-gradient(180deg,#111 0%,#090909 42%,#050505 100%);min-height:100vh;line-height:1.6}body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:72px 72px;mask-image:linear-gradient(180deg,rgba(0,0,0,.35),transparent 85%);opacity:.4}a{color:inherit;text-decoration:none}button,input,select{font:inherit}.container{width:min(calc(100% - 2rem),var(--content-width));margin:0 auto}
    .site-header{position:sticky;top:0;z-index:1000;backdrop-filter:blur(16px);background:rgba(9,9,9,.84);border-bottom:1px solid rgba(255,255,255,.06)}.header-shell{min-height:var(--nav-height);display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.9rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.brand-mark{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(239,68,68,.9),rgba(127,29,29,.9)),#111;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);font-size:.92rem}.header-actions{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;justify-content:flex-end}
    .cta-link,.button{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 1.1rem;border-radius:999px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:transform .25s ease,box-shadow .25s ease,background-color .25s ease;border:1px solid transparent;cursor:pointer}.cta-link:hover,.button:hover,.cta-link:focus-visible,.button:focus-visible{transform:translateY(-2px);outline:none}.cta-primary,.button-primary{background:linear-gradient(135deg,var(--accent-strong),var(--accent));color:#fff;box-shadow:0 18px 32px rgba(220,38,38,.28)}.cta-secondary,.button-secondary,.button-danger{color:var(--text);border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}.button-danger{border-color:rgba(248,113,113,.3);color:var(--danger)}
    .hero{padding:3rem 0 1.2rem}.eyebrow,.badge{display:inline-flex;align-items:center;padding:.42rem .8rem;border-radius:999px;letter-spacing:.08em;text-transform:uppercase;font-size:.76rem;font-weight:700}.eyebrow{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--gold)}.badge{background:var(--accent-soft);color:#fca5a5}.hero h1{margin:1rem 0 .8rem;font-size:clamp(2.2rem,7vw,4.3rem);line-height:.98;letter-spacing:-.05em;text-transform:uppercase}.hero p,.muted,.empty,.status{margin:0;color:var(--muted)}
    .login-card,.filters-panel,.summary-panel,.table-panel{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03)),rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);box-shadow:var(--shadow)}.auth-shell{min-height:calc(100vh - var(--nav-height) - 80px);display:grid;place-items:center;padding:1rem 0 3rem}.login-card{width:min(100%,520px);padding:1.4rem}.field-grid,.filters-grid,.summary-grid,.dashboard-grid{display:grid;gap:1rem}.field{display:grid;gap:.45rem}.field label{color:var(--muted);font-size:.92rem}.field input,.field select{width:100%;padding:.95rem 1rem;border-radius:16px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.03);color:var(--text)}.field input:focus,.field select:focus{outline:1px solid rgba(220,38,38,.45);border-color:rgba(220,38,38,.45)}.button-row{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:1rem}.status.error{color:var(--danger)}.status.success{color:var(--success)}
    .dashboard{display:none;padding-bottom:3rem}.dashboard.visible{display:block}.filters-panel,.summary-panel,.table-panel{padding:1.25rem}.filters-head,.panel-head{display:flex;justify-content:space-between;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:.9rem}.summary-card{padding:1rem;border-radius:18px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03)}.summary-card strong{display:block;font-size:1.1rem}.summary-card span{color:var(--muted);font-size:.88rem}
    .table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:820px}th,td{padding:.95rem .85rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}th{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.08em}td small{display:block;color:var(--muted);margin-top:.25rem}.footer{padding:0 0 2.5rem;color:var(--muted)}.footer-shell{display:flex;flex-direction:column;gap:.75rem;padding-top:1.2rem;border-top:1px solid rgba(255,255,255,.08)}
    @media (min-width:720px){.field-grid,.filters-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (min-width:1024px){.dashboard-grid{grid-template-columns:.9fr 1.1fr;align-items:start}.summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.footer-shell{flex-direction:row;justify-content:space-between;align-items:center}}
  </style>
</head>
<body>
  <header class="site-header"><div class="container header-shell"><a class="brand" href="index.html"><span class="brand-mark">GB</span><span>Gym Boxing HK</span></a><div class="header-actions"><a class="cta-link cta-secondary" href="booking.html">預約頁</a><a class="cta-link cta-primary" href="index.html">主站</a></div></div></header>
  <main>
    <section class="hero"><div class="container"><span class="eyebrow">管理後台</span><h1>查看、篩選與管理預約資料。</h1><p>此頁只提供本機瀏覽器端管理存取。輸入密碼後才會顯示預約資料表。</p></div></section>
    <section class="auth-shell" id="auth-shell"><div class="container"><div class="login-card"><h2>密碼保護</h2><p class="muted">請輸入管理密碼，以檢視此瀏覽器中的預約資料。</p><form id="login-form"><div class="field-grid"><div class="field"><label for="admin-password">管理密碼</label><input id="admin-password" type="password" autocomplete="current-password" required placeholder="請輸入密碼"></div></div><div class="button-row"><button class="button button-primary" type="submit">進入後台</button></div><p class="status" id="login-status" aria-live="polite"></p></form></div></div></section>
    <section class="dashboard" id="dashboard"><div class="container"><div class="dashboard-grid"><div class="filters-panel"><div class="filters-head"><div><h2>篩選條件</h2><p class="muted">可按日期或課程類型縮窄結果。</p></div><button class="button button-secondary" id="logout-button" type="button">登出</button></div><div class="filters-grid"><div class="field"><label for="filter-date">日期</label><input id="filter-date" type="date"></div><div class="field"><label for="filter-class">課程類型</label><select id="filter-class"><option value="">全部課程</option><option value="boxing-fundamentals">拳擊基礎</option><option value="muay-thai">泰拳</option><option value="private-training">私人訓練</option><option value="sparring">對練課</option></select></div></div><div class="button-row"><button class="button button-secondary" id="clear-filters" type="button">清除篩選</button></div><p class="status" id="dashboard-status" aria-live="polite"></p></div><div class="summary-panel"><div class="panel-head"><div><h3>時段名額</h3><p class="muted">顯示目前篩選條件下各課程時段的剩餘位置。</p></div></div><div class="summary-grid" id="summary-grid"></div></div></div><div class="table-panel" style="margin-top:1rem"><div class="panel-head"><div><h3>所有預約</h3><p class="muted">刪除任何一筆預約後，該時段名額會即時釋放。</p></div></div><div class="table-wrap"><table><thead><tr><th>日期</th><th>課程</th><th>預約人</th><th>聯絡方式</th><th>特別要求</th><th>剩餘名額</th><th>操作</th></tr></thead><tbody id="bookings-body"></tbody></table></div><p class="empty" id="empty-state"></p></div></div></section>
  </main>
  <footer class="footer"><div class="container footer-shell"><div>Gym Boxing HK 管理後台</div><div>本機預約資料管理，可篩選、查看與刪除紀錄。</div></div></footer>
  <script>
    const STORAGE_KEY="gym-boxing-hk-bookings",AUTH_KEY="gym-boxing-hk-admin-auth",ADMIN_PASSWORD="admin123",MAX_CAPACITY=8;
    const loginForm=document.getElementById("login-form"),loginStatus=document.getElementById("login-status"),authShell=document.getElementById("auth-shell"),dashboard=document.getElementById("dashboard"),filterDate=document.getElementById("filter-date"),filterClass=document.getElementById("filter-class"),clearFiltersButton=document.getElementById("clear-filters"),logoutButton=document.getElementById("logout-button"),dashboardStatus=document.getElementById("dashboard-status"),summaryGrid=document.getElementById("summary-grid"),bookingsBody=document.getElementById("bookings-body"),emptyState=document.getElementById("empty-state");
    function loadBookings(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch(e){return[]}}function saveBookings(bookings){localStorage.setItem(STORAGE_KEY,JSON.stringify(bookings))}function parseDateKey(v){const p=v.split("-").map(Number);return new Date(p[0],p[1]-1,p[2])}function formatDate(v){return new Intl.DateTimeFormat("zh-HK",{weekday:"short",year:"numeric",month:"short",day:"numeric"}).format(parseDateKey(v))}function formatTimeLabel(v){const p=v.split(":").map(Number);return new Intl.DateTimeFormat("zh-HK",{hour:"numeric",minute:"2-digit"}).format(new Date(2020,0,1,p[0],p[1]))}
    function filteredBookings(){const dateValue=filterDate.value,classValue=filterClass.value;return loadBookings().filter((b)=>!dateValue||b.date===dateValue).filter((b)=>!classValue||b.classId===classValue).sort((a,b)=>(a.date+a.time+a.createdAt).localeCompare(b.date+b.time+b.createdAt))}
    function slotCount(bookings,classId,date,time){return bookings.filter((b)=>b.classId===classId&&b.date===date&&b.time===time).length}
    function renderSummary(bookings){if(bookings.length===0){summaryGrid.innerHTML='<p class="empty">沒有符合目前篩選條件的預約。</p>';return}const keys=Array.from(new Set(bookings.map((b)=>[b.classId,b.className,b.date,b.time].join("|"))));summaryGrid.innerHTML=keys.map((key)=>{const parts=key.split("|"),count=slotCount(bookings,parts[0],parts[2],parts[3]),left=Math.max(MAX_CAPACITY-count,0);return `<div class="summary-card"><span class="badge">${parts[1]}</span><strong>${formatDate(parts[2])}</strong><strong>${formatTimeLabel(parts[3])}</strong><span>餘下 ${left} 位 / 共 ${MAX_CAPACITY} 位</span></div>`}).join("")}
    function renderTable(bookings){if(bookings.length===0){bookingsBody.innerHTML="";emptyState.textContent="沒有符合目前篩選條件的預約。";dashboardStatus.textContent="目前載入 0 筆預約。";dashboardStatus.className="status";return}emptyState.textContent="";dashboardStatus.textContent="目前載入 "+bookings.length+" 筆預約。";dashboardStatus.className="status success";bookingsBody.innerHTML=bookings.map((booking)=>{const live=loadBookings(),left=Math.max(MAX_CAPACITY-slotCount(live,booking.classId,booking.date,booking.time),0);return `<tr><td>${formatDate(booking.date)}<small>${formatTimeLabel(booking.time)}</small></td><td>${booking.className}<small>HK$${booking.price} / ${booking.duration}</small></td><td>${booking.name}<small>${booking.email}</small></td><td>${booking.phone}</td><td>${booking.requests||"無"}</td><td>${left}</td><td><button class="button button-danger" type="button" data-delete-id="${booking.id}">刪除</button></td></tr>`}).join("");bookingsBody.querySelectorAll("[data-delete-id]").forEach((button)=>button.addEventListener("click",()=>{const id=button.getAttribute("data-delete-id"),bookingsList=loadBookings(),target=bookingsList.find((booking)=>booking.id===id);if(!target){renderDashboard();return}if(!window.confirm("是否刪除 "+target.name+" 於 "+formatDate(target.date)+" "+formatTimeLabel(target.time)+" 的預約？"))return;saveBookings(bookingsList.filter((booking)=>booking.id!==id));renderDashboard()}))}
    function renderDashboard(){const bookings=filteredBookings();renderSummary(bookings);renderTable(bookings)}
    function setAuthState(isAuthenticated){if(isAuthenticated){sessionStorage.setItem(AUTH_KEY,"true");authShell.style.display="none";dashboard.classList.add("visible");renderDashboard()}else{sessionStorage.removeItem(AUTH_KEY);authShell.style.display="grid";dashboard.classList.remove("visible")}}
    loginForm.addEventListener("submit",(event)=>{event.preventDefault();const password=document.getElementById("admin-password").value;if(password===ADMIN_PASSWORD){loginStatus.textContent="已成功登入。";loginStatus.className="status success";setAuthState(true)}else{loginStatus.textContent="密碼錯誤。";loginStatus.className="status error"}});filterDate.addEventListener("input",renderDashboard);filterClass.addEventListener("change",renderDashboard);clearFiltersButton.addEventListener("click",()=>{filterDate.value="";filterClass.value="";renderDashboard()});logoutButton.addEventListener("click",()=>setAuthState(false));if(sessionStorage.getItem(AUTH_KEY)==="true")setAuthState(true);
  </script>
</body>
</html>
